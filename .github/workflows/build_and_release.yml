name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allows you to manually trigger the workflow from the Actions tab

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install Dependencies
        run: flutter pub get

      - name: Build macOS app
        run: flutter build macos --release

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "MELTS Parser" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "MELTS Parser.app" 150 190 \
            --hide-extension "MELTS Parser.app" \
            --app-drop-link 450 190 \
            "MELTS-Parser-macOS.dmg" \
            "build/macos/Build/Products/Release/MELTS Parser.app"

      - name: Upload DMG as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MELTS-Parser-macOS
          path: MELTS-Parser-macOS.dmg

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: MELTS-Parser-macOS.dmg

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows app
        run: flutter build windows --release

      - name: Create Windows Installer
        run: |
          $issContent = @"
          [Setup]
          AppName=MELTS Parser
          AppVersion=1.0.0
          DefaultDirName={autopf}\MELTS Parser
          DefaultGroupName=MELTS Parser
          OutputDir=.\Output
          OutputBaseFilename=MELTS-Parser-Setup
          SetupIconFile=windows\runner\resources\app_icon.ico
          Compression=lzma2
          SolidCompression=yes
          PrivilegesRequired=lowest

          [Tasks]
          Name: "desktopicon"; Description: "Create a &desktop icon"; GroupDescription: "Additional icons:"

          [Files]
          Source: "build\windows\x64\runner\Release\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{autoprograms}\MELTS Parser"; Filename: "{app}\melts_parser.exe"
          Name: "{autodesktop}\MELTS Parser"; Filename: "{app}\melts_parser.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\melts_parser.exe"; Description: "Launch MELTS Parser"; Flags: nowait postinstall skipifsilent
          "@
          Set-Content -Path installer.iss -Value $issContent
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload Installer as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MELTS-Parser-Windows-Installer
          path: Output\MELTS-Parser-Setup.exe

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Output\MELTS-Parser-Setup.exe
